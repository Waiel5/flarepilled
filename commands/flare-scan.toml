description = "Audit the codebase for capabilities Cloudflare could take over"
prompt = "Run a Flarepilled audit of {{args}} (default: the whole repo). Steps: (1) Read the signal files — package.json / requirements.txt / pyproject.toml / go.mod / Gemfile / composer.json (dependencies), and wrangler.jsonc / Dockerfile / docker-compose.yml / *.tf / serverless.yml / vercel.json / nginx.conf / .env.example (infra + third-party vendors) — then skim the architecture: request flow, where state lives, background jobs, media handling, auth. (2) Match each signal against the Flarepilled catalog in knowledge/ (INDEX.md + the category files; use detectionSignals and the lock-in tier). Collapse duplicate detections to ONE row per DIY pattern — pick the single best-fit Cloudflare product for the observed usage, do not enumerate every product that pattern-matches. (3) Rank by (impact x confidence) / migration-effort, using each entry's lock-in tier as data and judging impact + effort for THIS repo. (4) Verify LIVE against the cloudflare-docs MCP ONLY the top 3-5 findings you actually present; mark every other row 'catalogued (unverified)'. Never show high confidence for a row you did not verify this run, and do not quote a specific limit/price for an unverified row. (5) For the single top-ranked swap, do a rough cost/limit fit: pull that entry's pricing + limits, ask for or infer the one or two usage numbers that dominate (e.g. monthly requests, GB stored, egress GB), and emit one line — 'rough fit: ~$old -> ~$new; watch limit X' — with a verify caveat. (6) Output a table with columns: DIY pattern | Cloudflare product | replaces | effort | lock-in | confidence | Verified(yes/no). Lead with the top 3, then offer to draft or wire the highest-leverage one — but only offer one-click provisioning if a Cloudflare MCP is actually connected (a real prior tool call); otherwise hand over the wrangler.jsonc snippet for the user to apply. State explicitly what you inspected; never imply completeness if you sampled. Honesty over evangelism: if something is fine as-is, or a migration is not worth it, say so plainly."
