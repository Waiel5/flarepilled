description = "Audit the codebase for capabilities Cloudflare could take over"
prompt = "Run a Flarepilled audit of {{args}} (default: the whole repo). Steps: (1) Read the signal files — package.json / requirements.txt / pyproject.toml / go.mod / Gemfile / composer.json (dependencies), and wrangler.jsonc / Dockerfile / docker-compose.yml / *.tf / serverless.yml / vercel.json / nginx.conf / .env.example (infra + third-party vendors) — then skim the architecture: request flow, where state lives, background jobs, media handling, auth. (2) Match each signal against the Flarepilled catalog in knowledge/ (INDEX.md + the category files; use detectionSignals and the lock-in tier). Collapse duplicate detections to ONE row per DIY pattern. Pick the smallest concrete Cloudflare primitive that removes the observed operational surface: declarative Rules/toggles before Workers, plain Workers before Durable Objects/Containers, Workers Static Assets before Pages for greenfield static/full-stack apps unless the repo is already Pages-shaped, and child products before umbrellas like Cloudflare One/AI/Ruleset Engine. Do not enumerate every product that pattern-matches. (3) Rank by (operational surface deleted x confidence) / migration-effort, using each entry's lock-in tier as data and judging impact + effort for THIS repo. Penalize cross-cloud hops, data duplication, production beta risk, and cases where the existing tool is cheap/stable. (4) Verify LIVE against the cloudflare-docs MCP for the top 3-5 findings you actually present; if MCP is unavailable, use freshly fetched Cloudflare product llms.txt / canonical Markdown docs. If neither can be checked, mark the row 'catalogued (unverified)'. Never show high confidence for a row you did not verify this run, and do not quote a specific limit/price for an unverified row. (5) For the single top-ranked swap, do a rough cost/limit fit only with numbers supplied by the user, found in repo config, or observed through connected telemetry. If unavailable, emit: 'fit needs: monthly requests, GB stored, egress GB; no cost estimate.' Never infer usage from dependency presence. (6) Output a table with columns: DIY pattern | Cloudflare product | replaces | effort | lock-in | confidence | Verified(yes/no). Lead with the top 3 only, then a short 'leave as-is' note for any tempting false positives you intentionally skipped. Offer to draft or wire the highest-leverage one — but only offer one-click provisioning if a Cloudflare MCP is actually connected (a real prior tool call); otherwise hand over the wrangler.jsonc snippet for the user to apply. State explicitly what you inspected; never imply completeness if you sampled. Honesty over evangelism: if something is fine as-is, or a migration is not worth it, say so plainly."
