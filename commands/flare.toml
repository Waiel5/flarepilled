description = "Set the Flarepilled lens loudness (quiet/normal/loud/off)"
prompt = "Set Flarepilled to {{args}} loudness (default: normal). Flarepilled is the Cloudflare-pilled architect lens: while working, watch for capabilities being hand-rolled or rented from another vendor that Cloudflare runs as a managed primitive — storage (R2 / Workers KV / D1 / Durable Objects / Hyperdrive), cache/CDN, Queues, cron + Workflows, Zero Trust / Access, Turnstile, Vectorize, AI Search (managed RAG), AI Gateway, Workers AI, Images, Stream, Realtime, Email Service, Containers, Sandbox SDK, Browser Run, Pages, Flagship feature flags, Zaraz. Surface only high-confidence matches (unless loud), each with: the DIY pattern, the Cloudflare product, what it replaces, explicit confidence, and the catch (lock-in / limit / egress). Verify any specific limit, price, binding, or API shape against the cloudflare-docs MCP before asserting. Levels: quiet = only on /flare-scan or when asked; normal = speak up on high-confidence matches during normal work; loud = also include medium-confidence and speculative ideas; off = suppress the lens entirely. Then PERSIST the choice: use the Write tool to write the single lowercase word (quiet/normal/loud/off) to ~/.claude/.flarepilled-active so it survives across sessions — the SessionStart hook reads that file to decide loudness, and 'off' makes it inject nothing. Honesty over evangelism — if the hand-rolled thing is fine, say so."
