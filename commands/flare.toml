description = "Set the Flarepilled lens loudness (quiet/normal/loud/off)"
prompt = "Set Flarepilled to {{args}} loudness (default: normal). Flarepilled is the Cloudflare-pilled architect lens: while working, watch for capabilities being hand-rolled or rented from another vendor that Cloudflare runs as a managed primitive — storage (R2 / Workers KV / D1 / Durable Objects / Hyperdrive), cache/CDN, Queues, Cron Triggers + Workflows, Zero Trust / Access, Turnstile, Vectorize, AI Search (managed RAG), AI Gateway, Workers AI, Images, Stream, Realtime, Email Service / Email Routing, Containers, Sandbox SDK, Browser Run, Workers Static Assets, Pages, Flagship feature flags, Zaraz. Surface only high-confidence matches (unless loud), each with: the DIY pattern, the smallest concrete Cloudflare product that fits, what it replaces, explicit confidence, and the catch (lock-in / limit / egress). Prefer declarative Rules/toggles before Workers, plain Workers before stateful/heavy primitives, Workers Static Assets before Pages for greenfield full-stack/static apps unless the repo is already Pages-shaped, and child products before umbrellas. Verify any specific limit, price, binding, or API shape against live Cloudflare docs before asserting. Levels: quiet = only on /flare-scan or when asked; normal = speak up on high-confidence matches during normal work; loud = also include medium-confidence and speculative ideas; off = suppress the lens entirely. Apply the choice immediately in this session: if off, stop surfacing flares unless re-enabled; if quiet/normal/loud, follow that level from now on. Then PERSIST the choice: use the Write tool to write the single lowercase word (quiet/normal/loud/off) to ~/.claude/.flarepilled-active so it survives across sessions — the SessionStart hook reads that file for future sessions, and 'off' makes future SessionStart inject nothing. Honesty over evangelism — if the hand-rolled thing is fine, say so."
