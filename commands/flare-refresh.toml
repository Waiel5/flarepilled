description = "Re-check the Flarepilled catalog against Cloudflare's live docs and report drift"
prompt = "Refresh the Flarepilled catalog's freshness. Steps: (1) Fetch Cloudflare's canonical index https://developers.cloudflare.com/llms.txt and diff it against the saved snapshot at knowledge/sources/developers.cloudflare.com-llms.txt — report every product ADDED, REMOVED, or RENAMED since the build date shown in knowledge/INDEX.md. Classify docs-only roots (for example style-guide, learning-paths, agent-setup, docs-for-agents, migration-guides, support, use-cases, reference-architecture) separately; they may improve procedures/prompts but are not automatically catalog products. (2) If the user named a specific product, derive the authoritative docs root from that entry's developers.cloudflare.com docs URLs and/or the master index, then fetch its product llms.txt when one exists; if a product has no llms.txt, reconcile against the canonical Markdown docs linked from the entry and the cloudflare-docs MCP. Do not assume the catalog entry already contains an llms.txt URL. (3) Reconcile capabilities / limits / pricing against what the catalog claims, flagging anything stale or changed. (4) Summarize the drift as a short list, each with its canonical doc link, and offer to update the affected entries. IMPORTANT: never rewrite a catalog entry from memory — every change must be grounded in freshly-fetched docs (use WebFetch and the cloudflare-docs MCP). When entries change, edit knowledge/sources/catalog.json and re-run `python3 knowledge/sources/build_catalog.py`; for many new/changed products, re-run the catalog research workflow. After a true docs refresh, update the saved snapshot in knowledge/sources/ and knowledge/sources/.built, then regenerate. See knowledge/FRESHNESS.md for the canonical sources and the full procedure."
