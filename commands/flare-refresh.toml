description = "Re-check the Flarepilled catalog against Cloudflare's live docs and report drift"
prompt = "Refresh the Flarepilled catalog's freshness. Steps: (1) Fetch Cloudflare's canonical index https://developers.cloudflare.com/llms.txt and diff it against the saved snapshot at knowledge/sources/developers.cloudflare.com-llms.txt — report every product ADDED, REMOVED, or RENAMED since the build date shown in knowledge/INDEX.md. (2) If the user named a specific product, fetch that product's own llms.txt (linked in its catalog entry's `docs:`) and reconcile its capabilities / limits / pricing against what the catalog claims, flagging anything stale or changed. (3) Summarize the drift as a short list, each with its canonical doc link, and offer to update the affected entries. IMPORTANT: never rewrite a catalog entry from memory — every change must be grounded in freshly-fetched docs (use WebFetch and the cloudflare-docs MCP). When entries change, edit knowledge/sources/catalog.json and re-run `python3 knowledge/sources/build_catalog.py`; for many new/changed products, re-run the catalog research workflow. After refreshing, update the snapshot in knowledge/sources/ and the build date in INDEX.md. See knowledge/FRESHNESS.md for the canonical sources and the full procedure."
